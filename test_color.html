<!DOCTYPE html>
<html>
<head>
<style>
  .box {
    width: 100px; height: 100px;
    margin: 10px;
  }
  .target { background-color: #fff0e6; } /* Light peach */
  .target2 { background-color: #fcf5ee; } /* Light warm yellow/pink */
  .test { 
    background-color: #0f0500; 
    filter: invert(1) hue-rotate(180deg);
  }
  .test2 {
    background-color: #000f14;
    filter: invert(1) hue-rotate(180deg);
  }
</style>
</head>
<body>
  <div class="box target">Target</div>
  <div class="box test">Test 1</div>
  <div class="box test2">Test 2</div>
</body>
</html>
